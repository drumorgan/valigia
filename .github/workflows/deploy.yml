name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /

      # Belt-and-suspenders: SamKirkland/FTP-Deploy-Action has historically
      # skipped dotfiles from local-dir (its internal glob doesn't set dot:true),
      # so .htaccess can silently never leave the runner. Upload it explicitly
      # here. Idempotent — if the action already shipped it, we just overwrite
      # with identical bytes.
      - name: Ensure .htaccess is uploaded (dotfile workaround)
        run: |
          curl --silent --show-error --fail --ssl-reqd \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            --upload-file dist/.htaccess \
            "ftp://${{ secrets.FTP_SERVER }}/.htaccess"
