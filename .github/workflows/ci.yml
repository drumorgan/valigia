name: CI

# Tests + build on every PR (and direct pushes to main, belt-and-suspenders).
# The deploy workflow builds again with the real Supabase env; this build
# runs env-less purely as a syntax/bundling gate, which is all it needs —
# supabase.js only reads import.meta.env at runtime.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Backtest self-test (synthetic shelves)
        run: node scripts/backtest.mjs --synthetic

      - name: Build
        run: npm run build
