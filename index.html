<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Valigia — Torn City Travel Arbitrage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=Syne+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <header id="app-header">
      <h1 class="logo">Valigia</h1>
      <p class="logo-subtitle">Torn City Travel Arbitrage</p>
      <p class="logo-credit">by <a href="https://www.torn.com/profiles.php?XID=3667375" target="_blank" rel="noopener" class="giro-link">Giro Vagabondo</a></p>
      <div id="pda-scouts-banner" class="pda-scouts-banner" hidden>
        <span class="pda-scouts-label">Scouts (24h)</span>
        <span class="pda-scouts-sep">·</span>
        <span class="pda-scouts-segment" id="pda-travel-segment" hidden>
          <span class="pda-scouts-pagelabel">Travel</span>
          <span class="pda-scouts-count" id="pda-travel-scouts">--</span>
          <span class="pda-scouts-events" id="pda-travel-events"></span>
        </span>
        <span class="pda-scouts-sep" id="pda-sep-travel-itemmarket" hidden>·</span>
        <span class="pda-scouts-segment" id="pda-item_market-segment" hidden>
          <span class="pda-scouts-pagelabel">Item Market</span>
          <span class="pda-scouts-count" id="pda-item_market-scouts">--</span>
          <span class="pda-scouts-events" id="pda-item_market-events"></span>
        </span>
        <span class="pda-scouts-sep" id="pda-sep-itemmarket-bazaar" hidden>·</span>
        <span class="pda-scouts-segment" id="pda-bazaar-segment" hidden>
          <span class="pda-scouts-pagelabel">Bazaar</span>
          <span class="pda-scouts-count" id="pda-bazaar-scouts">--</span>
          <span class="pda-scouts-events" id="pda-bazaar-events"></span>
        </span>
      </div>
    </header>
    <nav id="tab-nav" class="tab-nav" hidden>
      <button class="tab-btn tab-btn--active" data-tab="travel" type="button">Travel</button>
      <button class="tab-btn" data-tab="watchlist" type="button">
        Watchlist<span class="tab-badge" id="tab-watchlist-badge" hidden></span>
      </button>
    </nav>
    <main id="screen-container">
      <p class="status">Loading…</p>
    </main>
    <div class="crosslink-box">
      <div class="crosslink-label">More Torn tools by Giro Vagabondo</div>
      <div class="crosslink-list">
        <div><a href="https://happyjump.girovagabondo.com" target="_blank" rel="noopener" class="crosslink-link crosslink-happyjump">HappyJump</a> &mdash; Insured drug packages for Torn City</div>
        <div><a href="https://tornder.girovagabondo.com" target="_blank" rel="noopener" class="crosslink-link crosslink-tornder">Tornder</a> &mdash; Swipe your way through Torn City</div>
        <div><a href="https://yoinkadventures.com" target="_blank" rel="noopener" class="crosslink-link crosslink-yoink">Yoink Adventures</a> &mdash; <span id="yoink-tagline"></span></div>
      </div>
    </div>
  </div>
  <script>
    (() => {
      const tags = [
        'Turn your travels into a real-world game',
        'Start collecting your world — on a map',
        'A travel tracker that feels like a game',
        'Collect your adventures. See them on a map.',
        'Explore the world like a game board'
      ];
      const el = document.getElementById('yoink-tagline');
      if (el) el.textContent = tags[Math.floor(Math.random() * tags.length)];
    })();
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
